  <script type="text/babel" data-presets="env,react">
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      render() {
        if (this.state.error) return (
          <div style={{ padding: '4rem 2rem', fontFamily: 'JetBrains Mono, monospace' }}>
            <div style={{ fontSize: '0.65rem', letterSpacing: '0.25em', color: '#C4364D', marginBottom: '1rem' }}>SYSTEM ERROR</div>
            <div style={{ fontSize: '0.8rem', color: '#374151', opacity: 0.8 }}>{this.state.error.message}</div>
          </div>
        );
        return this.props.children;
      }
    }
    let _mountAttempts = 0;
    function tryMount() {
      if (window.App && window.Navigation && window.ProjectIndex && window.CaseStudy && window.DeepLearningCaseStudy && window.MarsRoverCaseStudy && window.SpineExoskeletonCaseStudy && window.RespiratoryCaseStudy && window.Reveal && window.HandsModel && window.IntroSection && window.AboutSection && window.SpecializationsSection && window.FloatingPillNav && window.CONTENT && window.LanguageSelector) {
        document.getElementById('mount-fallback')?.remove();
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><window.App /></ErrorBoundary>);
      } else {
        if (_mountAttempts++ === 333 /* ~10s */ && !document.getElementById('mount-fallback')) {
          const fb = document.createElement('div');
          fb.id = 'mount-fallback';
          fb.style.cssText = 'padding:4rem 2rem;font-family:JetBrains Mono,monospace;color:#C4364D;font-size:0.7rem;letter-spacing:0.2em';
          fb.textContent = 'STILL LOADING — CHECK CONSOLE IF THIS PERSISTS';
          document.getElementById('root').appendChild(fb);
        }
        setTimeout(tryMount, 30);
      }
    }
    tryMount();
  </script>
