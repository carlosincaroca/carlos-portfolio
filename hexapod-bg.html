<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas { display: block; width: 100vw; height: 100vh; position: relative; z-index: 1; }

    /* ── Dramatic dark stage — faded in only during Model View ── */
    #stage {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      background-size: 100% 100%, 60px 60px, 60px 60px, 100% 100%;
    }
    #stage.active { opacity: 1; }
    /* Dark mode — moody sci-fi stage */
    #stage.dark {
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, #07090f 100%),
        linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px),
        #07090f;
    }
    /* Light mode — bright blueprint studio, same ambiance, with a warm
       sunlit corner echoing the dark stage's top-left glow */
    #stage.light {
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 45%, #DBE2EA 100%),
        radial-gradient(ellipse 55% 45% at 10% 6%, rgba(255, 176, 102, 0.30), transparent 70%),
        linear-gradient(rgba(46, 92, 154, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 92, 154, 0.05) 1px, transparent 1px),
        #F4F0E8;
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px, 100% 100%;
    }

    #loader {
      position: fixed; inset: 0;
      background: rgba(7,9,15,0.92);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      font-family: 'JetBrains Mono', monospace;
      color: #00e5ff;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; }
    .loader-bar-wrap { width: 180px; height: 2px; background: rgba(0,229,255,0.1); border-radius: 2px; overflow: hidden; }
    .loader-bar { height: 100%; width: 0%; background: #00e5ff; border-radius: 2px; transition: width 0.2s ease; }
    .loader-pct { font-size: 10px; color: rgba(200,212,224,0.5); }

    /* ── Interaction hint (Model View) — fades out on first drag/zoom ── */
    #hint {
      position: fixed;
      left: 50%; bottom: 2.5rem;
      transform: translateX(-50%) translateY(10px);
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      border: 1px solid rgba(196,54,77,0.55);
      border-radius: 100px;
      color: #C4364D;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1), visibility 0.5s;
      pointer-events: none;
    }
    #hint.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    #hint .hint-item { display: inline-flex; align-items: center; gap: 7px; }
    #hint svg { width: 15px; height: 15px; opacity: 0.85; }
    #hint .hint-sep { opacity: 0.4; }
    #hint.dark  { background: rgba(10,14,24,0.7); }
    #hint:not(.dark) { background: rgba(245,241,232,0.82); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="loader">
    <div class="loader-title">Loading Assembly</div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
    <div class="loader-pct" id="loader-pct">0%</div>
  </div>

  <div id="stage"></div>
  <canvas id="canvas"></canvas>

  <div id="hint" aria-hidden="true">
    <span class="hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
      <span id="hint-rotate">Drag to rotate</span>
    </span>
    <span class="hint-sep">·</span>
    <span class="hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <span id="hint-zoom">Scroll to zoom</span>
    </span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }    from 'three/addons/loaders/DRACOLoader.js';
    import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
    import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

    /* ── Model source (Vercel Blob — Draco-compressed .glb) ── */
    const MODEL_URL = 'https://it4hsyd2kjmsott7.public.blob.vercel-storage.com/hexapod.glb';

    /* ── Renderer — transparent so the portfolio bg shows through ── */
    const canvas   = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;

    /* ── Scene ── (transparent background; fog kept from the viewer) */
    const scene  = new THREE.Scene();
    scene.fog    = new THREE.FogExp2(0x07090f, 0.008);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
    camera.position.set(0, 1, 5);

    /* ── Controls — present but gated on Model View (see setModelView) ── */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan     = false;   // keep the model centred
    controls.enabled       = false;   // off until Model View is entered

    /* Model View state — gates interactivity, the dark stage, and the ground below */
    let modelViewActive = false;

    /* ── Lights ── */
    scene.add(new THREE.AmbientLight(0x1a2a3a, 1.2));
    const keyLight = new THREE.DirectionalLight(0xd0eeff, 2.4);
    keyLight.position.set(4, 6, 3);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.setScalar(4096);
    keyLight.shadow.normalBias = 0.02;
    /* Tight shadow frustum around the assembled model = high texel density
       (crisp shadows); widened during explode so flying parts stay covered. */
    const SHADOW_TIGHT = 3.0;
    const SHADOW_WIDE  = 6.0;
    {
      const sc = keyLight.shadow.camera;
      sc.left = -SHADOW_TIGHT; sc.right = SHADOW_TIGHT;
      sc.top = SHADOW_TIGHT; sc.bottom = -SHADOW_TIGHT;
      sc.updateProjectionMatrix();
    }
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xff8844, 0.7);
    fillLight.position.set(-5, 2, -3);
    scene.add(fillLight);
    scene.add(new THREE.HemisphereLight(0x002244, 0x001122, 0.6));

    /* ── Ground plane (shadow catcher, theme-aware) ── */
    const GROUND_DARK  = 0x0a0e18;
    const GROUND_LIGHT = 0xF5F1E8;
    const FOG_DARK     = 0x07090f;
    const FOG_LIGHT    = 0xF5F1E8;

    function isDark() {
      try { return window.parent.document.documentElement.getAttribute('data-theme') === 'dark'; }
      catch(e) { return false; }
    }

    const groundMat = new THREE.MeshStandardMaterial({
      color: GROUND_LIGHT,
      roughness: 0.9, metalness: 0.1,
    });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    /* Sync ground, fog, and the stage backdrop variant to the page theme.
       The dark stage stays dramatic; the light stage is a bright studio with
       the same ambiance (vignette + blueprint grid). */
    function applyTheme() {
      const dark  = isDark();
      groundMat.color.setHex(dark ? GROUND_DARK : GROUND_LIGHT);
      if (scene.fog) scene.fog.color.setHex(dark ? FOG_DARK : FOG_LIGHT);
      /* Theme the lights too: dark = cool key + warm rim (the corner glow);
         light = golden-hour key with the warm fill turned up, so the warmth
         carries over instead of washing out against the bright ground. */
      keyLight.color.setHex(dark ? 0xd0eeff : 0xF5F1E8);  // light = the page's paper tone
      keyLight.intensity = dark ? 2.4 : 2.1;
      fillLight.color.setHex(dark ? 0xff8844 : 0xffa055);
      fillLight.intensity = dark ? 0.7 : 0.7;
      const stage = document.getElementById('stage');
      if (stage) { stage.classList.toggle('dark', dark); stage.classList.toggle('light', !dark); }
      const hint = document.getElementById('hint');
      if (hint) hint.classList.toggle('dark', dark);
    }

    try {
      new MutationObserver(applyTheme).observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    } catch(e) {}
    applyTheme();

    /* ── Model pivot (clean rotation around centre) ── */
    const pivot = new THREE.Group();
    scene.add(pivot);

    /* ── Explode config & state ──────────────────────────────────
       Two-level proportional displacement: each leg sub-unit's delta is
         (legCentre − modelCentre)·GLOBAL + (subCentre − legCentre)·LOCAL
       Electronics are co-located at the centre, so proportional can't
       separate them — they get an absolute XZ fan + vertical lift instead. */
    const EXPLODE_AMOUNT  = 1.0;   // master multiplier on every displacement
    const EXPLODE_GLOBAL  = 1.0;   // legs separate ∝ distance from body centre
    const EXPLODE_LOCAL   = 1.4;   // leg parts bloom ∝ distance from leg centre
    const MOTOR_SPREADS   = {      // per-motor controls (same slot on all 6 legs)
      1: { spread: 1.1 },                        // Motor 1 (furthest from body)
      2: { spread: 1.5 },                        // Motor 2 (middle)
      3: { spread: 0.3, dir: [0, 1, 0] },        // Motor 3 (closest) — straight up
    };
    const ELEC_OUT        = 0.5;   // electronics fan outward (world units)
    const ELEC_LIFT       = 0.9;   // electronics rise (world units)
    const RIG_LIFT        = 0.8;   // whole rig raised so parts don't hit the floor
    const EXPLODED_ZOOM   = 0.61;  // camera zoom while exploded (assembled: CAM_ZOOM)
    const EXPLODED_ELEV   = 15.9;  // camera elevation while exploded (assembled: CAM_ELEV)
    const EXPLODE_SPEED   = 1.8;   // seconds to fully explode / implode
    const CAM_SPEED       = 0.9;   // seconds for the camera phase (runs first)

    const parts = [];              // filled after model loads
    let explodeTarget = 0;         // 0 = assembled, 1 = exploded
    let explodeFactor = 0;         // current animated value (parts)
    let camFactor     = 0;         // current animated value (camera pull-back phase)
    let camBaseDist   = 0;         // set after load (model-fit distance at zoom 1)
    let camZoomIn     = 1;         // assembled zoom (CAM_ZOOM, set after load)
    let camElevIn     = 30;        // assembled elevation (CAM_ELEV, set after load)
    let camAzimuth    = 0;         // default azimuth (CAM_AZIMUTH, set after load)
    let groundSeatY   = 0;         // ground height touching the assembled model

    /* Exposed for the parent page (same-origin) */
    window.toggleExplode = () => {
      explodeTarget = explodeTarget === 0 ? 1 : 0;
      return explodeTarget; // 1 = exploded, 0 = assembled
    };

    /* ── Model View interactivity gate ──────────────────────────────
       Off  → non-interactive turntable, camera locked at default pose.
       On   → OrbitControls (drag + zoom) enabled, auto-rotate paused.
       Exit → ease camera back to the default pose, re-lock.            */
    const CAM_RESET_TIME = 0.6;          // seconds for the ease-back
    let camTween         = null;         // { fromPos, fromTarget, t }
    let modelReady       = false;        // framing captured (default pose computable)
    const defaultTarget  = new THREE.Vector3(0, 0, 0);
    const easeInOutCubic = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;

    /* The default pose follows the explode state: the explode sequence pulls
       the camera back (camFactor 0→1), so the ease-back destination must be
       computed from the CURRENT camFactor, not a fixed snapshot. */
    function defaultPose(f, out) {
      const zoom = camZoomIn + (EXPLODED_ZOOM - camZoomIn) * f;
      const elev = (camElevIn + (EXPLODED_ELEV - camElevIn) * f) * Math.PI / 180;
      const dist = camBaseDist * zoom;
      return (out || new THREE.Vector3()).set(
        defaultTarget.x + dist * Math.sin(camAzimuth) * Math.cos(elev),
        defaultTarget.y + dist * Math.sin(elev),
        defaultTarget.z + dist * Math.cos(camAzimuth) * Math.cos(elev)
      );
    }

    /* ── Interaction hint (auto-fades on first drag/zoom, ~4s fallback) ── */
    const hintEl = document.getElementById('hint');
    function showHint() { if (hintEl) hintEl.classList.add('show'); }
    function hideHint() { if (hintEl) hintEl.classList.remove('show'); }
    function applyHintWording(touch) {
      const r = document.getElementById('hint-rotate');
      const z = document.getElementById('hint-zoom');
      if (r) r.textContent = touch ? 'Swipe to rotate' : 'Drag to rotate';
      if (z) z.textContent = touch ? 'Pinch to zoom'  : 'Scroll to zoom';
    }
    // Initial fallback guess; the parent passes the real input type per entry.
    applyHintWording(window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window);
    // Also self-correct if the user actually touches/clicks the model directly.
    renderer.domElement.addEventListener('pointerdown', (e) => applyHintWording(e.pointerType === 'touch'));
    controls.addEventListener('start', hideHint);  // fires on drag or wheel-zoom

    window.setModelView = (on, touch) => {
      modelViewActive = !!on;
      if (typeof touch === 'boolean') applyHintWording(touch);
      // Fade the dramatic dark stage in/out
      const stage = document.getElementById('stage');
      if (stage) stage.classList.toggle('active', modelViewActive);
      applyTheme();   // ground / fog / stage variant follow the page theme
      if (modelViewActive) {
        camTween = null;            // cancel any pending ease-back
        controls.enabled = true;
        showHint();
      } else {
        controls.enabled = false;
        hideHint();
        if (modelReady) camTween = {
          fromPos:    camera.position.clone(),
          fromTarget: controls.target.clone(),
          t: 0,
        };
      }
      return modelViewActive;
    };

    /* ── Load Draco .glb ── */
    const loaderEl = document.getElementById('loader');
    const barEl    = document.getElementById('loader-bar');
    const pctEl    = document.getElementById('loader-pct');

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);
    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;

        model.traverse((obj) => {
          if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
        });

        /* Centre + fit */
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 3 / maxDim;

        model.position.sub(center.multiplyScalar(scale));
        model.scale.setScalar(scale);
        // This export is already Y-up (height is the Y axis) — no flip needed.
        pivot.add(model);

        /* Seat ground just below the model (RIG_LIFT later opens the gap) */
        const scaledBox = new THREE.Box3().setFromObject(pivot);
        ground.position.y = scaledBox.min.y - 0.01;

        /* Camera framing */
        const CAM_ZOOM    = 0.47;  // 1.0 fits snugly, <1 closer, >1 further
        const CAM_ELEV    = 26.0;  // degrees above horizon
        const CAM_AZIMUTH = 23.6;  // horizontal orbit (0 = front)
        camBaseDist = (maxDim * scale) / Math.tan((camera.fov * Math.PI) / 360);
        camZoomIn   = CAM_ZOOM;
        camElevIn   = CAM_ELEV;
        camAzimuth  = CAM_AZIMUTH * Math.PI / 180;

        const fitDist = camBaseDist * CAM_ZOOM;
        const elevRad = CAM_ELEV * Math.PI / 180;
        camera.position.set(
          fitDist * Math.sin(camAzimuth) * Math.cos(elevRad),
          fitDist * Math.sin(elevRad),
          fitDist * Math.cos(camAzimuth) * Math.cos(elevRad)
        );
        controls.target.copy(defaultTarget);
        controls.update();

        /* Constrain Model View zoom/orbit */
        controls.minDistance  = fitDist * 0.45;
        controls.maxDistance  = fitDist * 2.5;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;   // stay above the floor

        loaderEl.classList.add('hidden');

        /* ── Regroup (P5) ───────────────────────────────────────────
           The export is flat: 727 top-level children — 6 arm assemblies, the
           body, and ~720 loose electronics nodes. Group them into physical
           units so each explodes as one rigid thing:
            · UNO R4         = its 53 loose pieces           → one host
            · Buck converter = its 37 loose pieces           → one host
            · LIPO / 9V      = already single nodes
            · Aux            = the unnamed Surface/Part swarm → one host
              (the PCA9685 isn't named in the export — it lives in here)
           And inside each leg:
            · 3 motors  = consecutive runs of "Part 1..11" (+ nearest horn)
            · 2 shocks  = the 10 "1603-BZ01" pieces, split 5+5 in tree order
            · 5 structural "Hexapod *" pieces stay individual sub-units */
        const assemblyRoot = model.children[0]; // "HEXAPOD FINAL ASSEMBLY3"

        const origName = (o) => (o.userData && o.userData.name) || o.name || '';
        const has = (o, s) => origName(o).toLowerCase().includes(s);

        assemblyRoot.updateWorldMatrix(true, true);

        const mkHost = (parent, label) => {
          const h = new THREE.Group();
          h.userData.name = label;
          parent.add(h);
          return h;
        };
        const centerOf = (o) =>
          new THREE.Box3().setFromObject(o).getCenter(new THREE.Vector3());

        // -- top level: fuse loose electronics pieces onto unit hosts --
        const unoHost  = mkHost(assemblyRoot, 'UNO R4');
        const buckHost = mkHost(assemblyRoot, 'Buck Converter');
        const auxHost  = mkHost(assemblyRoot, 'Aux (PCA9685 + wiring)');
        const legs = [];
        let bodyNode = null;
        [...assemblyRoot.children].forEach((child) => {
          if (child === unoHost || child === buckHost || child === auxHost) return;
          if (has(child, 'arm assembly')) { legs.push(child); return; }
          if (has(child, 'hexapod body')) { bodyNode = child; return; } // anchored base
          if (has(child, 'lipo') || has(child, '9v-batter')) return; // own units
          if (has(child, 'uno r4'))         { unoHost.attach(child);  return; }
          if (has(child, 'buck converter')) { buckHost.attach(child); return; }
          auxHost.attach(child); // preserves world transform
        });

        // -- inside each leg: group motors + shocks into rigid hosts --
        legs.forEach((leg) => {
          const snapshot = [...leg.children];
          const motorHosts = [];
          let curMotor = null, curNums = null;
          const shockPieces = [];
          const horns = [];
          snapshot.forEach((child) => {
            const nm = origName(child).toLowerCase();
            const partNum = nm.match(/^occurrence of part (\d+)$/);
            if (partNum) {
              // a new motor starts when a part number repeats in the run
              if (!curMotor || curNums.has(partNum[1])) {
                curMotor = mkHost(leg, 'Motor ' + (motorHosts.length + 1));
                curNums = new Set();
                motorHosts.push(curMotor);
              }
              curNums.add(partNum[1]);
              curMotor.attach(child);
            } else if (nm.includes('1603')) {
              shockPieces.push(child);
            } else if (nm.includes('servo horn')) {
              horns.push(child);
            }
            // 'Hexapod *' structural pieces stay as direct children
          });
          const shockA = mkHost(leg, 'Shock 1');
          const shockB = mkHost(leg, 'Shock 2');
          const half = Math.ceil(shockPieces.length / 2);
          shockPieces.forEach((p, i) => (i < half ? shockA : shockB).attach(p));
          // each horn rides with its nearest motor
          horns.forEach((horn) => {
            const hc = centerOf(horn);
            let best = motorHosts[0], bd = Infinity;
            motorHosts.forEach((m) => {
              const d = centerOf(m).distanceTo(hc);
              if (d < bd) { bd = d; best = m; }
            });
            if (best) best.attach(horn);
          });
          // Number motors by physical position, not tree order:
          // Motor 1 = furthest from the body … Motor 3 = closest.
          const bodyCentre = centerOf(bodyNode);
          [...motorHosts]
            .sort((a, b) => centerOf(b).distanceTo(bodyCentre)
                          - centerOf(a).distanceTo(bodyCentre))
            .forEach((m, i) => { m.userData.name = 'Motor ' + (i + 1); });
        });

        // Movable units: leg sub-units move within their leg; everything else
        // top-level (except the body) moves as a whole.
        const assemblyParts = assemblyRoot.children;
        const mergeTargets = [];
        assemblyParts.forEach((child) => {
          if (legs.includes(child)) mergeTargets.push(...child.children);
          else mergeTargets.push(child);
        });

        /* ── Mesh merge (draw-call reduction) ──────────────────────
           Collapse each movable unit's descendant meshes into one mesh per
           material (baked into unit-local space). Units stay separate, so the
           explode below is unaffected — this just trims draw calls. */
        const cleanGeo = (src, relMatrix) => {
          const g = src.index ? src.toNonIndexed() : src.clone();
          g.applyMatrix4(relMatrix);
          if (!g.attributes.normal) g.computeVertexNormals();
          const out = new THREE.BufferGeometry();
          out.setAttribute('position', g.attributes.position);
          out.setAttribute('normal',   g.attributes.normal);
          return out;
        };
        mergeTargets.forEach((part) => {
          part.updateWorldMatrix(true, true);
          const partInv = part.matrixWorld.clone().invert();
          const groups  = new Map(); // material -> { geos:[], olds:[] }
          part.traverse((o) => {
            if (o.isMesh && o.geometry) {
              o.updateWorldMatrix(true, false);
              const rel = partInv.clone().multiply(o.matrixWorld);
              const mat = Array.isArray(o.material) ? o.material[0] : o.material;
              if (!groups.has(mat)) groups.set(mat, { geos: [], olds: [] });
              const grp = groups.get(mat);
              grp.geos.push(cleanGeo(o.geometry, rel));
              grp.olds.push(o);
            }
          });
          groups.forEach(({ geos, olds }, mat) => {
            const merged = mergeGeometries(geos, false);
            if (!merged) return; // leave originals in place on failure
            olds.forEach((o) => { o.parent && o.parent.remove(o); o.geometry.dispose(); });
            const mesh = new THREE.Mesh(merged, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            part.add(mesh);
          });
        });

        /* ── Explode setup ───────────────────────────────────────── */
        const modelWorldCenter = new THREE.Vector3();
        new THREE.Box3().setFromObject(pivot).getCenter(modelWorldCenter);

        parts.length = 0;

        const subTag = (sub) => origName(sub)
          .replace(/^Hexapod /i, '').replace(/ Final.*$/i, '');

        const pushUnit = (unit, worldDelta, baseSpread = 1.0) => {
          const ubox = new THREE.Box3().setFromObject(unit);
          if (ubox.isEmpty()) return;
          // worldToLocal handles the model's native unit scale (P6)
          const wp = new THREE.Vector3();
          unit.getWorldPosition(wp);
          const localDir = unit.parent.worldToLocal(wp.clone().add(worldDelta))
            .sub(unit.position);
          parts.push({ mesh: unit, originalPos: unit.position.clone(), localDir, spread: baseSpread });
        };

        assemblyParts.forEach((part) => {
          if (has(part, 'hexapod body')) return; // anchored base

          if (legs.includes(part)) {
            const legCentre = centerOf(part);
            const radial = legCentre.clone().sub(modelWorldCenter);
            radial.y = 0;
            part.children.forEach((sub) => {
              const subCentre = centerOf(sub);
              const globalPart = radial.clone().multiplyScalar(EXPLODE_GLOBAL);
              let localPart = subCentre.clone().sub(legCentre).multiplyScalar(EXPLODE_LOCAL);
              const mNum = origName(sub).match(/^Motor (\d)$/);
              const mCfg = mNum ? MOTOR_SPREADS[mNum[1]] : null;
              if (mCfg && mCfg.dir) {
                // dir-motors: ride outward with the leg at full strength;
                // spread scales ONLY the redirected bloom (the vertical kick)
                localPart = new THREE.Vector3(mCfg.dir[0], mCfg.dir[1], mCfg.dir[2])
                  .normalize().multiplyScalar(localPart.length() * mCfg.spread);
                pushUnit(sub, globalPart.add(localPart), 1.0);
              } else {
                pushUnit(sub, globalPart.add(localPart), mCfg ? mCfg.spread : 1.0);
              }
            });
            return;
          }

          // electronics: fan outward in XZ + rise off the body
          const fan = centerOf(part).sub(modelWorldCenter);
          fan.y = 0;
          if (fan.length() < 1e-6) fan.set(Math.random() - 0.5, 0, Math.random() - 0.5);
          fan.normalize();
          const worldDelta = fan.multiplyScalar(ELEC_OUT)
            .add(new THREE.Vector3(0, ELEC_LIFT, 0));
          pushUnit(part, worldDelta);
        });

        // Lift the whole rig (P7) so exploded parts clear the floor —
        // camera and target rise with it, so the framing is unchanged.
        pivot.position.y  += RIG_LIFT;
        controls.target.y += RIG_LIFT;
        camera.position.y += RIG_LIFT;
        defaultTarget.y   += RIG_LIFT;
        controls.update();

        // Re-seat the ground against the LIFTED model so the feet touch it
        // while assembled; animate() lowers it during explode so flying
        // parts keep their floor clearance.
        groundSeatY = ground.position.y + RIG_LIFT;
        ground.position.y = groundSeatY;

        modelReady = true;
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          barEl.style.width = pct + '%';
          pctEl.textContent = pct + '%';
        } else {
          pctEl.textContent = (xhr.loaded / 1048576).toFixed(0) + ' MB';
        }
      },
      (err) => {
        console.error('GLB load error:', err);
        pctEl.textContent = 'Error loading model';
      }
    );

    /* ── Animation loop ── */
    const ROTATION_SPEED = 0.18; // rad/sec — target turntable speed
    const SPIN_DAMP      = 2.0;  // how fast the spin eases to/from a stop (per sec)
    let   rotSpeed       = ROTATION_SPEED; // current eased angular speed
    let lastTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const now   = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime    = now;

      /* Two-phase explode sequence: exploding = camera pulls back FIRST,
         then parts fly; assembling = parts return first, then camera
         pushes back in. */
      const step    = delta / EXPLODE_SPEED;
      const camStep = delta / CAM_SPEED;
      const prevCam = camFactor;
      if (explodeTarget === 1) {
        if (camFactor < 1)           camFactor     = Math.min(camFactor + camStep, 1);
        else if (explodeFactor < 1)  explodeFactor = Math.min(explodeFactor + step, 1);
      } else {
        if (explodeFactor > 0)       explodeFactor = Math.max(explodeFactor - step, 0);
        else if (camFactor > 0)      camFactor     = Math.max(camFactor - camStep, 0);
      }

      /* Drive the camera distance/elevation only while its phase animates,
         keeping the current azimuth — works both locked and in Model View. */
      if (camFactor !== prevCam && modelReady && !camTween) {
        const dist = camBaseDist * (camZoomIn + (EXPLODED_ZOOM - camZoomIn) * camFactor);
        const elev = (camElevIn + (EXPLODED_ELEV - camElevIn) * camFactor) * Math.PI / 180;
        const v    = camera.position.clone().sub(controls.target);
        const azi  = Math.atan2(v.x, v.z); // keep the user's current azimuth
        camera.position.set(
          controls.target.x + dist * Math.sin(azi) * Math.cos(elev),
          controls.target.y + dist * Math.sin(elev),
          controls.target.z + dist * Math.cos(azi) * Math.cos(elev)
        );
      }

      if (parts.length > 0) {
        parts.forEach(({ mesh, originalPos, localDir, spread }) => {
          const offset = localDir.clone().multiplyScalar(explodeFactor * EXPLODE_AMOUNT * spread);
          mesh.position.copy(originalPos).add(offset);
        });
      }

      /* Ground recedes with the explode so downward-blooming parts clear it */
      if (modelReady) ground.position.y = groundSeatY - RIG_LIFT * explodeFactor;

      /* Shadow frustum tracks the explode: tight (crisp) assembled, wide exploded */
      {
        const s = SHADOW_TIGHT + (SHADOW_WIDE - SHADOW_TIGHT) * explodeFactor;
        const sc = keyLight.shadow.camera;
        if (sc.right !== s) {
          sc.left = -s; sc.right = s; sc.top = s; sc.bottom = -s;
          sc.updateProjectionMatrix();
        }
      }

      /* Camera: ease back to the default pose on Model View exit (the pose
         tracks the current explode pull-back), else normal update */
      if (camTween && modelReady) {
        camTween.t = Math.min(camTween.t + delta / CAM_RESET_TIME, 1);
        const e = easeInOutCubic(camTween.t);
        camera.position.lerpVectors(camTween.fromPos, defaultPose(camFactor), e);
        controls.target.lerpVectors(camTween.fromTarget, defaultTarget, e);
        camera.lookAt(controls.target);
        if (camTween.t >= 1) camTween = null;
      } else {
        controls.update();
      }

      /* Auto-rotate — eases to a stop entering Model View, spins back up on exit */
      const targetSpin = modelViewActive ? 0 : ROTATION_SPEED;
      rotSpeed += (targetSpin - rotSpeed) * (1 - Math.exp(-SPIN_DAMP * delta));
      pivot.rotation.y += rotSpeed * delta;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
