<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas { display: block; width: 100vw; height: 100vh; position: relative; z-index: 1; }

    /* ── Dramatic dark stage — faded in only during Model View ── */
    #stage {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      background-size: 100% 100%, 60px 60px, 60px 60px, 100% 100%;
    }
    #stage.active { opacity: 1; }
    /* Dark mode — moody sci-fi stage */
    #stage.dark {
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, #07090f 100%),
        linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px),
        #07090f;
    }
    /* Light mode — bright blueprint studio, same ambiance, with a warm
       sunlit corner echoing the dark stage's top-left glow */
    #stage.light {
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 45%, #DBE2EA 100%),
        radial-gradient(ellipse 55% 45% at 10% 6%, rgba(255, 176, 102, 0.30), transparent 70%),
        linear-gradient(rgba(46, 92, 154, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 92, 154, 0.05) 1px, transparent 1px),
        #F4F0E8;
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px, 100% 100%;
    }

    #loader {
      position: fixed; inset: 0;
      background: rgba(7,9,15,0.92);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      font-family: 'JetBrains Mono', monospace;
      color: #00e5ff;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; }
    .loader-bar-wrap { width: 180px; height: 2px; background: rgba(0,229,255,0.1); border-radius: 2px; overflow: hidden; }
    .loader-bar { height: 100%; width: 0%; background: #00e5ff; border-radius: 2px; transition: width 0.2s ease; }
    .loader-pct { font-size: 10px; color: rgba(200,212,224,0.5); }

    /* ── Interaction hint (Model View) — fades out on first drag/zoom ── */
    #hint {
      position: fixed;
      left: 50%; bottom: 2.5rem;
      transform: translateX(-50%) translateY(10px);
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      border: 1px solid rgba(196,54,77,0.55);
      border-radius: 100px;
      color: #C4364D;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1), visibility 0.5s;
      pointer-events: none;
    }
    #hint.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    #hint .hint-item { display: inline-flex; align-items: center; gap: 7px; }
    #hint svg { width: 15px; height: 15px; opacity: 0.85; }
    #hint .hint-sep { opacity: 0.4; }
    #hint.dark  { background: rgba(10,14,24,0.7); }
    #hint:not(.dark) { background: rgba(245,241,232,0.82); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="loader">
    <div class="loader-title">Loading Assembly</div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
    <div class="loader-pct" id="loader-pct">0%</div>
  </div>

  <div id="stage"></div>
  <canvas id="canvas"></canvas>

  <div id="hint" aria-hidden="true">
    <span class="hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
      <span id="hint-rotate">Drag to rotate</span>
    </span>
    <span class="hint-sep">·</span>
    <span class="hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <span id="hint-zoom">Scroll to zoom</span>
    </span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }    from 'three/addons/loaders/DRACOLoader.js';
    import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
    import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

    /* ── Model source (Vercel Blob — Draco-compressed .glb) ── */
    const MODEL_URL = 'https://it4hsyd2kjmsott7.public.blob.vercel-storage.com/mini-rover.glb';

    /* ── Renderer — transparent so the portfolio bg shows through ── */
    const canvas   = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;

    /* ── Scene ── (transparent background; fog kept from the viewer) */
    const scene  = new THREE.Scene();
    scene.fog    = new THREE.FogExp2(0x07090f, 0.008);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
    camera.position.set(0, 1, 5);

    /* ── Controls — present but gated on Model View (see setModelView) ── */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan     = false;   // keep the model centred
    controls.enabled       = false;   // off until Model View is entered

    /* Model View state — gates interactivity, the dark stage, and the ground below */
    let modelViewActive = false;

    /* ── Lights ── */
    scene.add(new THREE.AmbientLight(0x1a2a3a, 1.2));
    const keyLight = new THREE.DirectionalLight(0xd0eeff, 2.4);
    keyLight.position.set(4, 6, 3);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.setScalar(2048);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xff8844, 0.7);
    fillLight.position.set(-5, 2, -3);
    scene.add(fillLight);
    scene.add(new THREE.HemisphereLight(0x002244, 0x001122, 0.6));

    /* ── Ground plane (shadow catcher, theme-aware) ── */
    const GROUND_DARK  = 0x0a0e18;
    const GROUND_LIGHT = 0xF5F1E8;
    const FOG_DARK     = 0x07090f;
    const FOG_LIGHT    = 0xF5F1E8;

    function isDark() {
      try { return window.parent.document.documentElement.getAttribute('data-theme') === 'dark'; }
      catch(e) { return false; }
    }

    const groundMat = new THREE.MeshStandardMaterial({
      color: GROUND_LIGHT,
      roughness: 0.9, metalness: 0.1,
    });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    /* Sync ground, fog, and the stage backdrop variant to the page theme.
       The dark stage stays dramatic; the light stage is a bright studio with
       the same ambiance (vignette + blueprint grid). */
    function applyTheme() {
      const dark  = isDark();
      groundMat.color.setHex(dark ? GROUND_DARK : GROUND_LIGHT);
      if (scene.fog) scene.fog.color.setHex(dark ? FOG_DARK : FOG_LIGHT);
      /* Theme the lights too: dark = cool key + warm rim (the corner glow);
         light = golden-hour key with the warm fill turned up, so the warmth
         carries over instead of washing out against the bright ground. */
      keyLight.color.setHex(dark ? 0xd0eeff : 0xF5F1E8);  // light = the page's paper tone
      keyLight.intensity = dark ? 2.4 : 2.1;
      fillLight.color.setHex(dark ? 0xff8844 : 0xffa055);
      fillLight.intensity = dark ? 0.7 : 0.7;
      const stage = document.getElementById('stage');
      if (stage) { stage.classList.toggle('dark', dark); stage.classList.toggle('light', !dark); }
      const hint = document.getElementById('hint');
      if (hint) hint.classList.toggle('dark', dark);
    }

    try {
      new MutationObserver(applyTheme).observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    } catch(e) {}
    applyTheme();

    /* ── Model pivot (clean rotation around centre) ── */
    const pivot = new THREE.Group();
    scene.add(pivot);

    /* ── Explode config & state ── */
    const EXPLODE_AMOUNT  = 0.2;   // how far parts fly out
    const BRACKET_LIFT    = 0.4;   // how high brackets rise above motors
    const WHEEL_SPREAD    = 1.3;   // wheel distance multiplier
    const SENSOR_SPREAD   = 0.35;  // QRD opto-sensors barely drift
    const SERVO_SPREAD    = 0.4;   // servos drift outward with the assembly
    const EXPLODE_SPEED   = 1.8;   // seconds to fully explode / implode

    const parts = [];              // filled after model loads
    let explodeTarget = 0;         // 0 = assembled, 1 = exploded
    let explodeFactor = 0;         // current animated value

    /* Exposed for the parent page (same-origin) */
    window.toggleExplode = () => {
      explodeTarget = explodeTarget === 0 ? 1 : 0;
      return explodeTarget; // 1 = exploded, 0 = assembled
    };

    /* ── Model View interactivity gate ──────────────────────────────
       Off  → non-interactive turntable, camera locked at default pose.
       On   → OrbitControls (drag + zoom) enabled, auto-rotate paused.
       Exit → ease camera back to the default pose, re-lock.            */
    const CAM_RESET_TIME = 0.6;          // seconds for the ease-back
    let camTween         = null;         // { fromPos, fromTarget, t }
    let defaultCamPos    = null;         // captured after framing
    const defaultTarget  = new THREE.Vector3(0, 0, 0);
    const easeInOutCubic = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;

    /* ── Interaction hint (auto-fades on first drag/zoom, ~4s fallback) ── */
    const hintEl = document.getElementById('hint');
    function showHint() { if (hintEl) hintEl.classList.add('show'); }
    function hideHint() { if (hintEl) hintEl.classList.remove('show'); }
    function applyHintWording(touch) {
      const r = document.getElementById('hint-rotate');
      const z = document.getElementById('hint-zoom');
      if (r) r.textContent = touch ? 'Swipe to rotate' : 'Drag to rotate';
      if (z) z.textContent = touch ? 'Pinch to zoom'  : 'Scroll to zoom';
    }
    // Initial fallback guess; the parent passes the real input type per entry.
    applyHintWording(window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window);
    // Also self-correct if the user actually touches/clicks the model directly.
    renderer.domElement.addEventListener('pointerdown', (e) => applyHintWording(e.pointerType === 'touch'));
    controls.addEventListener('start', hideHint);  // fires on drag or wheel-zoom

    window.setModelView = (on, touch) => {
      modelViewActive = !!on;
      if (typeof touch === 'boolean') applyHintWording(touch);
      // Fade the dramatic dark stage in/out
      const stage = document.getElementById('stage');
      if (stage) stage.classList.toggle('active', modelViewActive);
      applyTheme();   // ground / fog / stage variant follow the page theme
      if (modelViewActive) {
        camTween = null;            // cancel any pending ease-back
        controls.enabled = true;
        showHint();
      } else {
        controls.enabled = false;
        hideHint();
        if (defaultCamPos) camTween = {
          fromPos:    camera.position.clone(),
          fromTarget: controls.target.clone(),
          t: 0,
        };
      }
      return modelViewActive;
    };

    /* ── Load Draco .glb ── */
    const loaderEl = document.getElementById('loader');
    const barEl    = document.getElementById('loader-bar');
    const pctEl    = document.getElementById('loader-pct');

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);
    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;

        model.traverse((obj) => {
          if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
        });

        /* Centre + fit */
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 3 / maxDim;

        model.position.sub(center.multiplyScalar(scale));
        model.scale.setScalar(scale);
        model.rotation.x = Math.PI;
        pivot.add(model);

        /* Camera framing */
        const CAM_ZOOM    = 1.0;   // 1.0 fits snugly, <1 closer, >1 further
        const CAM_ELEV    = 30;    // degrees above horizon
        const CAM_AZIMUTH = 180;   // horizontal orbit (180 = back)
        const fitDist = (maxDim * scale * CAM_ZOOM) / Math.tan((camera.fov * Math.PI) / 360);
        const elevRad = CAM_ELEV    * Math.PI / 180;
        const aziRad  = CAM_AZIMUTH * Math.PI / 180;
        camera.position.set(
          fitDist * Math.sin(aziRad) * Math.cos(elevRad),
          fitDist * Math.sin(elevRad),
          fitDist * Math.cos(aziRad) * Math.cos(elevRad)
        );
        controls.target.copy(defaultTarget);
        controls.update();

        /* Capture default pose + constrain Model View zoom/orbit */
        defaultCamPos = camera.position.clone();
        controls.minDistance  = fitDist * 0.45;
        controls.maxDistance  = fitDist * 2.5;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;   // stay above the floor

        /* Seat ground just below the model */
        const scaledBox = new THREE.Box3().setFromObject(pivot);
        ground.position.y = scaledBox.min.y - 0.01;

        loaderEl.classList.add('hidden');

        /* ── Mesh merge (draw-call reduction) ──────────────────────
           Collapse each top-level part's descendant meshes into one mesh
           per material (baked into part-local space). The 36 parts stay
           separate, so explode is unaffected — this just trims draw calls. */
        const assemblyRoot  = model.children[0];
        const assemblyParts = assemblyRoot ? assemblyRoot.children : model.children;

        const cleanGeo = (src, relMatrix) => {
          const g = src.index ? src.toNonIndexed() : src.clone();
          g.applyMatrix4(relMatrix);
          if (!g.attributes.normal) g.computeVertexNormals();
          const out = new THREE.BufferGeometry();
          out.setAttribute('position', g.attributes.position);
          out.setAttribute('normal',   g.attributes.normal);
          return out;
        };
        assemblyParts.forEach((part) => {
          part.updateWorldMatrix(true, true);
          const partInv = part.matrixWorld.clone().invert();
          const groups  = new Map(); // material -> { geos:[], olds:[] }
          part.traverse((o) => {
            if (o.isMesh && o.geometry) {
              o.updateWorldMatrix(true, false);
              const rel = partInv.clone().multiply(o.matrixWorld);
              const mat = Array.isArray(o.material) ? o.material[0] : o.material;
              if (!groups.has(mat)) groups.set(mat, { geos: [], olds: [] });
              const grp = groups.get(mat);
              grp.geos.push(cleanGeo(o.geometry, rel));
              grp.olds.push(o);
            }
          });
          groups.forEach(({ geos, olds }, mat) => {
            const merged = mergeGeometries(geos, false);
            if (!merged) return; // leave originals in place on failure
            olds.forEach((o) => { o.parent && o.parent.remove(o); o.geometry.dispose(); });
            const mesh = new THREE.Mesh(merged, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            part.add(mesh);
          });
        });

        /* ── Explode setup ─────────────────────────────────────────
           Display names repeat across parts and GLTFLoader underscores
           them — match on the ORIGINAL name (userData.name). */
        const modelWorldCenter = new THREE.Vector3();
        new THREE.Box3().setFromObject(pivot).getCenter(modelWorldCenter);

        const origName = (o) => (o.userData && o.userData.name) || o.name || '';
        const has = (o, s) => origName(o).toLowerCase().includes(s);

        parts.length = 0;

        /* The servo is exported as many co-located pieces; give the whole
           cluster ONE shared direction so it moves as a single rigid block. */
        const servoParts = assemblyParts.filter((p) => has(p, 'servo'));
        let servoLocalDir = null;
        if (servoParts.length) {
          const sbox = new THREE.Box3();
          servoParts.forEach((p) => sbox.expandByObject(p));
          if (!sbox.isEmpty()) {
            const dir = sbox.getCenter(new THREE.Vector3()).sub(modelWorldCenter);
            if (dir.length() < 0.001) dir.set(0, 1, 0);
            dir.y = Math.max(dir.y, 0);
            dir.normalize();
            const pq = new THREE.Quaternion();
            servoParts[0].parent.getWorldQuaternion(pq);
            servoLocalDir = dir.applyQuaternion(pq.invert());
          }
        }

        /* Pinned directions for parts that otherwise clump (world-space). */
        const OVERRIDES = {
          0:  { dir: [0, 0, -1], spread: 1.0 },   // Part 7
          1:  { dir: [0, 0, 1],  spread: 1.3 },   // Wheel's Body ┐ move together
          31: { dir: [0, 0, 1],  spread: 1.3 },   // Ball         ┘
          3:  { dir: [0, 1, 0],  spread: 0.8 },   // Part 8 → straight up
          6:  { dir: [0, 0, 1],  spread: 0.25 },  // QRD opto sensor
          10: { dir: [0, 0, -1], spread: -1.3 },  // Part 5 → forward (negative flips)
          44: { dir: [0, 0, -1], spread: 1.4 },   // HC-SR04 <1> → backward
        };

        assemblyParts.forEach((part, idx) => {
          const partBox = new THREE.Box3().setFromObject(part);
          if (partBox.isEmpty()) return;

          // Anchored (stays put): the rover base.
          if (has(part, 'rover base')) return;

          // Servo: every piece shares ONE direction → moves as a rigid block.
          if (has(part, 'servo')) {
            if (servoLocalDir) parts.push({
              mesh: part,
              originalPos: part.position.clone(),
              localDir: servoLocalDir,
              spread: SERVO_SPREAD,
            });
            return;
          }

          const ov = OVERRIDES[idx];

          const partWorldCenter = new THREE.Vector3();
          partBox.getCenter(partWorldCenter);

          const worldDir = ov
            ? new THREE.Vector3(ov.dir[0], ov.dir[1], ov.dir[2])
            : partWorldCenter.clone().sub(modelWorldCenter);
          if (worldDir.length() < 0.001)
            worldDir.set(Math.random() - 0.5, 0.3, Math.random() - 0.5);

          worldDir.y = Math.max(worldDir.y, 0);
          if (worldDir.length() < 0.001)
            worldDir.set(Math.random() - 0.5, 0.3, Math.random() - 0.5);
          worldDir.normalize();

          if (has(part, 'bracket')) worldDir.y += BRACKET_LIFT;
          worldDir.normalize();

          const parentQuat = new THREE.Quaternion();
          part.parent.getWorldQuaternion(parentQuat);
          const localDir = worldDir.clone().applyQuaternion(parentQuat.invert());

          const spread = ov ? ov.spread
                       : (has(part, 'wheel') || has(part, 'pololu'))   ? WHEEL_SPREAD
                       : (has(part, 'qrd') || has(part, 'opto trans')) ? SENSOR_SPREAD
                       : 1.0;

          parts.push({
            mesh: part,
            originalPos: part.position.clone(),
            localDir,
            spread,
          });
        });
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          barEl.style.width = pct + '%';
          pctEl.textContent = pct + '%';
        } else {
          pctEl.textContent = (xhr.loaded / 1048576).toFixed(0) + ' MB';
        }
      },
      (err) => {
        console.error('GLB load error:', err);
        pctEl.textContent = 'Error loading model';
      }
    );

    /* ── Animation loop ── */
    const ROTATION_SPEED = 0.18; // rad/sec — target turntable speed
    const SPIN_DAMP      = 2.0;  // how fast the spin eases to/from a stop (per sec)
    let   rotSpeed       = ROTATION_SPEED; // current eased angular speed
    let lastTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const now   = performance.now();
      const delta = (now - lastTime) / 1000;
      lastTime    = now;

      /* Explode lerp */
      const step = delta / EXPLODE_SPEED;
      if (explodeFactor < explodeTarget) explodeFactor = Math.min(explodeFactor + step, explodeTarget);
      if (explodeFactor > explodeTarget) explodeFactor = Math.max(explodeFactor - step, explodeTarget);

      if (parts.length > 0) {
        parts.forEach(({ mesh, originalPos, localDir, spread }) => {
          const offset = localDir.clone().multiplyScalar(explodeFactor * EXPLODE_AMOUNT * spread);
          mesh.position.copy(originalPos).add(offset);
        });
      }

      /* Camera: ease back to default on Model View exit, else normal update */
      if (camTween && defaultCamPos) {
        camTween.t = Math.min(camTween.t + delta / CAM_RESET_TIME, 1);
        const e = easeInOutCubic(camTween.t);
        camera.position.lerpVectors(camTween.fromPos, defaultCamPos, e);
        controls.target.lerpVectors(camTween.fromTarget, defaultTarget, e);
        camera.lookAt(controls.target);
        if (camTween.t >= 1) camTween = null;
      } else {
        controls.update();
      }

      /* Auto-rotate — eases to a stop entering Model View, spins back up on exit */
      const targetSpin = modelViewActive ? 0 : ROTATION_SPEED;
      rotSpeed += (targetSpin - rotSpeed) * (1 - Math.exp(-SPIN_DAMP * delta));
      pivot.rotation.y += rotSpeed * delta;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
